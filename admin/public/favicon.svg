<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Green circle background -->
  <rect width="32" height="32" rx="8" fill="#639922"/>

  <!-- Stethoscope earpieces -->
  <circle cx="11" cy="5" r="2" fill="white"/>
  <circle cx="21" cy="5" r="2" fill="white"/>

  <!-- Ear tubes -->
  <line x1="11" y1="7" x2="11" y2="11" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="21" y1="7" x2="21" y2="11" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Y junction -->
  <path d="M11 11 Q11 15 16 15 Q21 15 21 11" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Tube down -->
  <line x1="16" y1="15" x2="16" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Curve to chest piece -->
  <path d="M16 22 Q16 28 11 28" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Chest piece -->
  <circle cx="9" cy="28" r="4" fill="white"/>
  <circle cx="9" cy="28" r="2" fill="#639922"/>
</svg>
